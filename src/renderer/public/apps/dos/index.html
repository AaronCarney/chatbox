<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOS Games</title>
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; }

    /* Catalog view */
    #catalog { padding: 16px; height: 100vh; overflow-y: auto; }
    #catalog h1 { text-align: center; color: #00ff41; font-size: 20px; margin-bottom: 12px; text-shadow: 0 0 10px #00ff41; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-width: 900px; margin: 0 auto; }
    .game-card {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px; cursor: pointer;
      overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
    }
    .game-card:hover { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,255,65,0.2); border-color: #00ff41; }
    .game-card img { width: 100%; height: 100px; object-fit: cover; background: #0a0a1a; }
    .game-card .label { padding: 6px 8px; font-size: 11px; text-align: center; color: #a0a0c0; line-height: 1.3; }

    /* Emulator view */
    #emulator { display: none; height: 100vh; flex-direction: column; }
    #emu-toolbar { flex: 0 0 auto; padding: 6px 12px; background: #16213e; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0f3460; }
    #emu-toolbar button { background: #0f3460; color: #e0e0e0; border: 1px solid #00ff41; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
    #emu-toolbar button:hover { background: #00ff41; color: #1a1a2e; }
    #emu-toolbar .title { flex: 1; color: #00ff41; font-size: 13px; }
    #dos-container { flex: 1; background: #000; }
  </style>
</head>
<body>
  <div id="catalog">
    <h1>DOS Arcade</h1>
    <div class="game-grid" id="game-grid"></div>
  </div>

  <div id="emulator">
    <div id="emu-toolbar">
      <button id="btn-back">Back</button>
      <span class="title" id="emu-title"></span>
    </div>
    <div id="dos-container"></div>
  </div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script src="/sdk/chatbridge-sdk.js"></script>
  <script src="games.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
