<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toolbar">
    <button id="btn-new-game">New Game</button>
    <button id="btn-undo" disabled>Undo</button>
    <select id="mode-select">
      <option value="1p" selected>vs Computer</option>
      <option value="2p">2 Players</option>
    </select>
    <select id="clock-select">
      <option value="0">No Clock</option>
      <option value="3">3 min</option>
      <option value="5" selected>5 min</option>
      <option value="10">10 min</option>
      <option value="15">15 min</option>
    </select>
  </div>
  <div class="clock-bar">
    <div id="clock-white" class="clock white-clock">5:00</div>
    <div id="clock-black" class="clock black-clock">5:00</div>
  </div>
  <div id="board-container"></div>
  <div id="status" class="status"></div>
  <div id="move-history"></div>

  <!-- Promotion picker overlay -->
  <div id="promotion-overlay" class="promo-overlay" style="display:none">
    <div id="promotion-picker" class="promo-picker"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="/sdk/chatbridge-sdk.js"></script>
  <script src="engine.js"></script>
  <script src="board.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
